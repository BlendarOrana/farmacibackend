version: '3.8'

services:
  postgres:
    image: postgres:18-alpine   # The absolute latest stable version
    container_name: farmaci_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234 
      POSTGRES_DB: farmaci
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata: